name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Compress source code
      run: tar -czf deploy.tar.gz src public package*.json next.config.ts tsconfig.json .env.production Dockerfile
        
    - name: Deploy to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        source: "deploy.tar.gz"
        target: ${{ secrets.DEPLOY_PATH }}
        
    - name: Execute remote commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          cd ${{ secrets.DEPLOY_PATH }}
          
          # Extract the source code
          tar -xzf deploy.tar.gz
          rm deploy.tar.gz
          
          # Build the Docker image
          sudo docker build -t rafcio:latest .
          
          # Restart the specific container in the fairpact setup
          cd /opt/fairpact
          sudo docker compose -f docker-compose.prod.yml up -d rafcio
          
          echo "✅ Docker deployment completed successfully!"
