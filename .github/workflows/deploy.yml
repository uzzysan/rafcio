name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Build application
      run: npm run build
        
    - name: Deploy to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        source: ".next,public,package*.json,next.config.ts,tsconfig.json,src,.env.production"
        target: ${{ secrets.DEPLOY_PATH }}
        rm: true  # Remove existing files before upload
        
    - name: Execute remote commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          cd ${{ secrets.DEPLOY_PATH }}
          
          # Install production dependencies
          npm ci --production --legacy-peer-deps
          
          # Install PM2 globally if not present (or use existing process manager)
          if ! command -v pm2 &> /dev/null; then
            sudo npm install -g pm2
          fi
          
          # Restart or start the application
          pm2 restart rafcio-portfolio || pm2 start npm --name "rafcio-portfolio" -- start
          
          # Save PM2 config
          pm2 save
          
          echo "✅ Deployment completed successfully!"
